task:
  mae:
    patch_num: 12 
    his_num: 288
    pred_num: 0
    batch_size: 4  # [B, N, 288, 2]
    train_epochs: 1000
    lr : 0.0001
    add_target : True
  maml:
    his_num: 288
    pred_num: 12
    batch_size: 16
    task_num: 2
    add_target : True
    train_epochs : 25
    finetune_epochs : 400
    test_dataset : 'pems-bay'


model:
  mae: 
    spectral: False
    patch_size: 12
    in_channel: 1 
    out_channel: 128
    dropout: 0.1
    window_size: 288
    mask_size: 24
    mask_ratio: 0.75
    L: 4
    

  STnet:
    update_step : 2
    K: 10
    update_lr : 0.0005
    meta_lr : 0.001
    data_list : 'chengdu_shenzhen_metr'
# ===== CRCT V1 Relation-Concept Transfer =====
use_crct: 1
crct_mode: "v1"
crct_debug: 0
crct_dry_run: 0
crct_dump_dir: "./save/crct_debug"
crct_rho: 0.1
crct_candidate_topk: 20
crct_candidate_method: "corr"
crct_include_self_loop: 0
crct_sparse_topk: 20
crct_row_softmax: 1
crct_node_encoder: "tcn"
crct_hidden_dim: 64
crct_relation_dim: 64
crct_dropout: 0.1
crct_num_relations: 8
crct_attribution: "sparsemax"
crct_temperature: 1.0
crct_use_unknown: 1
crct_knownness_method: "entropy"
crct_unknown_floor: 0.0
crct_sparse_loss_weight: 0.0
crct_sharp_loss_weight: 0.0
crct_balance_loss_weight: 0.0
crct_consistency_loss_weight: 0.0
crct_relation_kd_weight: 0.0
crct_unknown_reg_weight: 0.0
crct_dump_every: 0
crct_dump_top_edges: 20

enable_checkpoint: True
resume: False
resume_path: ""
save_every: 1
save_best_only: False
checkpoint_dir: "./save/crct_runs"
checkpoint_prefix: "tpb_crct_rho0.1_rel8_top20"
overwrite_checkpoint: False
